<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100%" height="100%">
  <defs>
    <!-- Glowing green filter -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="3" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>

  <!-- Speedometer outer circular track (Calm dark gray track) -->
  <circle cx="50" cy="50" r="40" fill="none" stroke="#1c1d26" stroke-width="6" />

  <!-- Speedometer indicator arc (Neon Green eco sector) -->
  <path d="M 16.5 70 A 40 40 0 0 1 50 10" fill="none" stroke="#39FF14" stroke-width="6" stroke-linecap="round" filter="url(#neon-glow)" />

  <!-- Inner Zen Z-shaped sleek needle path -->
  <path d="M 45 42 L 55 42 L 45 58 L 55 58" fill="none" stroke="#ffffff" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" />

  <!-- Active Speed Needle (Pointing towards the top-right / 68 km/h position) -->
  <line x1="50" y1="50" x2="72" y2="28" stroke="#39FF14" stroke-width="4" stroke-linecap="round" filter="url(#neon-glow)" />

  <!-- Center Hub -->
  <circle cx="50" cy="50" r="4" fill="#ffffff" />
</svg>